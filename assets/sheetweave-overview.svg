<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SheetWeave overview</title>
  <desc id="desc">A drawing PDF goes into an agent using SheetWeave and becomes a merged vector PDF.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8FCF8"/>
      <stop offset="1" stop-color="#E3F3ED"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B1720"/>
      <stop offset="1" stop-color="#12352F"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#061014" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#1F7A6D" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1200" height="430" rx="34" fill="#F6FBF8"/>
  <path d="M0 338C180 280 305 346 456 310C642 266 775 212 954 252C1062 276 1140 244 1200 210V430H0V338Z" fill="#1F7A6D" fill-opacity="0.08"/>

  <g filter="url(#softShadow)">
    <rect x="66" y="78" width="254" height="270" rx="28" fill="url(#panel)" stroke="#D3E8DF"/>
    <rect x="474" y="58" width="252" height="310" rx="30" fill="url(#dark)"/>
    <rect x="880" y="78" width="254" height="270" rx="28" fill="url(#panel)" stroke="#D3E8DF"/>
  </g>

  <text x="96" y="126" fill="#0B1720" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Input PDF</text>
  <text x="96" y="158" fill="#49605A" font-family="Segoe UI, Arial, sans-serif" font-size="17">local drawing sheets</text>
  <g transform="translate(96 186)">
    <rect x="0" y="0" width="74" height="52" rx="8" fill="#FFFFFF" stroke="#1F7A6D" stroke-width="2"/>
    <rect x="86" y="0" width="74" height="52" rx="8" fill="#FFFFFF" stroke="#1F7A6D" stroke-width="2"/>
    <rect x="43" y="66" width="74" height="52" rx="8" fill="#FFFFFF" stroke="#1F7A6D" stroke-width="2"/>
    <path d="M12 18H60M12 31H52M98 18H146M98 31H136M55 84H105M55 97H96" stroke="#1F7A6D" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
  </g>

  <text x="519" y="114" fill="#F8FCF8" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">SheetWeave</text>
  <text x="530" y="144" fill="#FFE2A6" font-family="Segoe UI, Arial, sans-serif" font-size="16" letter-spacing="0.1em">AGENT SKILL</text>
  <g transform="translate(514 178)">
    <rect x="0" y="0" width="172" height="34" rx="17" fill="#F8FCF8" fill-opacity="0.13"/>
    <text x="20" y="23" fill="#F8FCF8" font-family="Segoe UI, Arial, sans-serif" font-size="16">detect overview</text>
    <rect x="0" y="48" width="172" height="34" rx="17" fill="#F8FCF8" fill-opacity="0.13"/>
    <text x="20" y="71" fill="#F8FCF8" font-family="Segoe UI, Arial, sans-serif" font-size="16">match neighbors</text>
    <rect x="0" y="96" width="172" height="34" rx="17" fill="#F8FCF8" fill-opacity="0.13"/>
    <text x="20" y="119" fill="#F8FCF8" font-family="Segoe UI, Arial, sans-serif" font-size="16">recover bridges</text>
    <rect x="0" y="144" width="172" height="34" rx="17" fill="#F8FCF8" fill-opacity="0.13"/>
    <text x="20" y="167" fill="#F8FCF8" font-family="Segoe UI, Arial, sans-serif" font-size="16">export vector PDF</text>
  </g>

  <text x="910" y="126" fill="#0B1720" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Output</text>
  <text x="910" y="158" fill="#49605A" font-family="Segoe UI, Arial, sans-serif" font-size="17">one reviewable vector plan</text>
  <g transform="translate(910 188)">
    <rect x="0" y="0" width="166" height="118" rx="12" fill="#FFFFFF" stroke="#1F7A6D" stroke-width="3"/>
    <path d="M23 28H140M23 50H140M23 72H88M96 72H140M23 94H140" stroke="#1F7A6D" stroke-width="4" stroke-linecap="round" opacity="0.72"/>
    <rect x="107" y="82" width="62" height="42" rx="8" fill="#F1C376"/>
    <text x="118" y="109" fill="#0B1720" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">PDF</text>
  </g>

  <path d="M344 214H438" stroke="#1F7A6D" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M754 214H848" stroke="#1F7A6D" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="410" y="394" text-anchor="middle" fill="#49605A" font-family="Segoe UI, Arial, sans-serif" font-size="18">You hand the PDF to your agent.</text>
  <text x="790" y="394" text-anchor="middle" fill="#49605A" font-family="Segoe UI, Arial, sans-serif" font-size="18">The skill handles the technical workflow.</text>
</svg>
